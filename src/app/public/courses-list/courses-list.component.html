<section class="page-hero" [attr.dir]="pageDir">
  <div class="container">
    <div class="page-hero-eyebrow">{{ eyebrowText }}</div>
    <h1 class="page-hero-title">{{ pageTitle }}</h1>
    <p class="page-hero-subtitle">
      {{ pageSubtitle }}
    </p>
  </div>
</section>

<div class="container search-container" [attr.dir]="pageDir">
  <label class="sr-only" for="courseSearch">{{ searchLabel }}</label>
  <input
    id="courseSearch"
    type="text"
    class="search-input"
    [placeholder]="searchPlaceholder"
    [(ngModel)]="search"
  />
</div>

<div class="container py-4" [attr.dir]="pageDir">
  <div *ngIf="loading" class="alert alert-info">{{ loadingText }}</div>
  <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

  <div *ngIf="!loading && !error" class="courses-grid">
    <article
      class="course-card"
      *ngFor="let c of courses | searchCourses: search"
    >
      <div
        class="course-image"
        [style.background-image]="'url(' + c.thumbnail + ')'"
      >
        <img
          [src]="c.thumbnail"
          [alt]="c.title"
          class="sr-only-img"
          loading="lazy"
        />
        <span class="course-tag">{{ c.categoryId || categoryFallback }}</span>
      </div>

      <div class="course-body">
        <h3 class="course-title">{{ c.title }}</h3>
        <p class="course-desc">{{ c.description }}</p>

        <div class="course-meta">
          <span class="course-level"></span>

          <span class="course-price">
            {{ c.displayPriceText || (c.price | currency: 'EGP' : 'symbol' : '1.0-0') }}
          </span>
        </div>
      </div>

      <div class="course-footer">
        <ng-container *ngIf="hasAccess(c.id); else noAccessButtons">
          <button class="btn btn-open" [routerLink]="['/courses', c.id]">
            {{ openCourseText }}
          </button>
        </ng-container>

        <ng-template #noAccessButtons>
          <button class="btn" [routerLink]="['/courses', c.id]">
            {{ detailsText }}
          </button>

          <button class="btn btn-primary" type="button" (click)="joinNow(c)">
            {{ enrollNowText }}
          </button>
        </ng-template>
      </div>
    </article>
  </div>
</div>
