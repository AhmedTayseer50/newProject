<section class="page-hero" [attr.dir]="pageDir">
  <div class="container">
    <div class="page-hero-eyebrow">{{ eyebrowText }}</div>
    <h1 class="page-hero-title">{{ pageTitle }}</h1>
    <p class="page-hero-subtitle">
      {{ pageSubtitle }}
    </p>
  </div>
</section>

<div class="container py-4" [attr.dir]="pageDir">
  <ng-container *ngIf="myCourses$ | async as list">
    <div *ngIf="!list.length" class="empty-state">
      <h3 class="empty-state-title">{{ emptyText }}</h3>
      <p class="empty-state-text">{{ emptyHintText }}</p>
    </div>

    <div *ngIf="list.length" class="courses-grid">
      <article
        class="course-card"
        *ngFor="let c of list; trackBy: trackByCourseId"
      >
        <div
          class="course-image"
          [style.background-image]="'url(' + (c.thumbnail || 'assets/images/placeholder-course.jpg') + ')'"
        >
          <img
            [src]="c.thumbnail || 'assets/images/placeholder-course.jpg'"
            [alt]="c.title || untitledText"
            class="sr-only-img"
            loading="lazy"
          />

          <span class="course-tag">{{ c.categoryId || categoryFallback }}</span>
        </div>

        <div class="course-body">
          <h3 class="course-title">{{ c.title || untitledText }}</h3>
          <p class="course-desc">{{ c.description || noDescriptionText }}</p>

          <div class="course-meta">
            <span class="course-level"></span>
            <span class="course-price">
              {{ c.displayPriceText || (c.price | currency: 'EGP' : 'symbol' : '1.0-0') }}
            </span>
          </div>
        </div>

        <div class="course-footer">
          <button class="btn btn-open" [routerLink]="['/courses', c.id]">
            {{ openCourseText }}
          </button>
        </div>
      </article>
    </div>
  </ng-container>
</div>
