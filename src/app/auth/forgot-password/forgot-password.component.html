<div class="container py-4" [attr.dir]="currentLang === 'ar' ? 'rtl' : 'ltr'">
  <div class="mx-auto" style="max-width: 560px;">
    <h3 class="mb-2" i18n>نسيت كلمة المرور</h3>
    <p class="text-muted mb-4" i18n>
      أدخل بريدك الإلكتروني وسنرسل لك رابطًا لإعادة تعيين كلمة المرور.
    </p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
      <div class="mb-3">
        <label class="form-label" i18n>البريد الإلكتروني</label>
        <input
          type="email"
          class="form-control"
          formControlName="email"
          i18n-placeholder
          placeholder="name@example.com"
        />
        <div *ngIf="emailError" class="form-text text-danger">
          {{ emailError }}
        </div>
      </div>

      <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

      <button class="btn btn-primary" type="submit" i18n>
        إرسال رابط الاستعادة
      </button>
    </form>

    <div *ngIf="sent" class="alert alert-success mt-3" i18n>
      تم إرسال رابط استعادة كلمة المرور إلى بريدك.
    </div>
  </div>
</div>
